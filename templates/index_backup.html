<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园智能广播系统 V4</title>
<style>
:root{
  --bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#94a3b8;
  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;--orange:#f59e0b;--purple:#a855f7;
  --zoneA:#ef4444;--zoneB:#3b82f6;--zoneC:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--card);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:1.3em;color:var(--orange)}
.header .right{display:flex;gap:12px;align-items:center;font-size:.9em}
.header .clock{color:var(--green);font-family:Consolas,monospace;font-size:1.1em;font-weight:bold}
.header .date-info{color:var(--dim);font-size:.85em}
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.nav button{flex:none;padding:10px 18px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:.9em;transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap}
.nav button:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav button.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:bold}
.main{max-width:1000px;margin:0 auto;padding:15px}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card h2{font-size:1.05em;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card h3{font-size:.95em;color:var(--dim);margin:10px 0 6px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0}
.col{flex:1;min-width:200px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.85em;transition:all .15s;color:white}
.btn:hover{opacity:.85;transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-red{background:var(--red)}.btn-green{background:var(--green)}.btn-blue{background:var(--blue)}
.btn-orange{background:var(--orange)}.btn-gray{background:#64748b}.btn-purple{background:var(--purple)}
.btn-sm{padding:5px 10px;font-size:.8em}
.btn-lg{padding:12px 24px;font-size:1em;font-weight:bold}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:.9em;width:100%}
input:focus,select:focus{outline:none;border-color:var(--blue)}
select{cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:.85em}
th{background:var(--bg);color:var(--dim);padding:8px 10px;text-align:left;position:sticky;top:0}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,.03)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:bold}
.tag-red{background:rgba(239,68,68,.2);color:var(--red)}
.tag-green{background:rgba(34,197,94,.2);color:var(--green)}
.tag-blue{background:rgba(59,130,246,.2);color:var(--blue)}
.tag-orange{background:rgba(245,158,11,.2);color:var(--orange)}
.zone-a{color:var(--zoneA)}.zone-b{color:var(--zoneB)}.zone-c{color:var(--zoneC)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-box{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.stat-box .label{font-size:.75em;color:var(--dim);margin-bottom:4px}
.stat-box .value{font-size:1.3em;font-weight:bold}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.zone-card{background:var(--bg);border-radius:8px;padding:14px;border-left:4px solid var(--dim)}
.zone-card.za{border-left-color:var(--zoneA)}.zone-card.zb{border-left-color:var(--zoneB)}.zone-card.zc{border-left-color:var(--zoneC)}
.zone-card .zname{font-size:1.1em;font-weight:bold;margin-bottom:6px}
.zone-card .zinfo{font-size:.8em;color:var(--dim);margin:2px 0}
.zone-card .zactions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.alert-bar{background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:14px;color:var(--red);font-size:.9em;display:none}
.ok-bar{background:rgba(34,197,94,.15);border:1px solid var(--green);border-radius:8px;padding:10px 14px;margin-bottom:14px;color:var(--green);font-size:.9em}
.empty{text-align:center;padding:30px;color:var(--dim)}
.upcoming-list{max-height:300px;overflow-y:auto}
.upcoming-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85em}
.upcoming-item .days{color:var(--orange);font-weight:bold}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h2{color:var(--blue);margin-bottom:12px}
.form-group{margin:10px 0}
.form-group label{display:block;font-size:.85em;color:var(--dim);margin-bottom:4px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:white;padding:10px 20px;border-radius:8px;font-size:.9em;transform:translateY(100px);transition:transform .3s;z-index:300}
.toast.show{transform:translateY(0)}
.toast.error{background:var(--red)}
@media(max-width:600px){
  .header h1{font-size:1.1em}.main{padding:10px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .zone-grid{grid-template-columns:1fr}
  .btn-lg{padding:10px 16px;font-size:.9em}
  table{font-size:.8em}
}
</style>
</head>
<body>

<div class="header">
  <h1>🔔 校园智能广播系统</h1>
  <div class="right">
    <span class="date-info" id="dateInfo"></span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<div class="nav" id="nav">
  <button class="active" data-page="dashboard">📊 总览</button>
  <button data-page="schedules">📋 课表</button>
  <button data-page="zones">🔊 区域</button>
  <button data-page="bells">🎵 铃声</button>
  <button data-page="holidays">📅 节假日</button>
  <button data-page="settings">⚙️ 设置</button>
  <button data-page="logs">📜 日志</button>
</div>

<div class="main">

<!-- ==================== 总览页 ==================== -->
<div class="page active" id="page-dashboard">
  <div id="dashAlert" class="alert-bar"></div>
  <div id="dashOk" class="ok-bar"></div>

  <div class="card">
    <h2>📊 系统状态</h2>
    <div class="stat-grid" id="statGrid"></div>
  </div>

  <div class="card">
    <h2>🎛️ 快捷操作</h2>
    <div class="row">
      <button class="btn btn-red btn-lg" onclick="bellAction('pause')">⏸ 全局暂停</button>
      <button class="btn btn-green btn-lg" onclick="bellAction('resume')">▶ 全局恢复</button>
      <button class="btn btn-orange btn-lg" onclick="bellAction('stop')">⏹ 停止播放</button>
    </div>
  </div>

  <div class="card">
    <h2>🔊 区域状态</h2>
    <div class="zone-grid" id="zoneGrid"></div>
  </div>

  <div class="card">
    <h2>🔔 快速打铃</h2>
    <div class="row">
      <button class="btn btn-red" onclick="quickRing('emergency')">🚨 紧急铃</button>
      <button class="btn btn-blue" onclick="quickRing('class_start')">📖 上课铃</button>
      <button class="btn btn-green" onclick="quickRing('class_end')">下课铃</button>
      <button class="btn btn-orange" onclick="quickRing('prepare')">预备铃</button>
      <button class="btn btn-gray" onclick="quickRing('school_end')">放学铃</button>
    </div>
  </div>

  <div class="card">
    <h2>⚡ 今日例外</h2>
    <p style="font-size:.85em;color:var(--dim);margin-bottom:8px">设置今天暂停打铃、今天不响等临时操作，只影响当天</p>
    <div class="row">
      <button class="btn btn-red" onclick="addException('pause_all')">🛑 今天全部暂停</button>
      <button class="btn btn-orange" onclick="addException('pause_zone','A')">🛑 教学楼暂停</button>
      <button class="btn btn-orange" onclick="addException('pause_zone','B')">🛑 操场暂停</button>
      <button class="btn btn-orange" onclick="addException('pause_zone','C')">🛑 宿舍暂停</button>
    </div>
    <div id="exceptionList" style="margin-top:10px"></div>
  </div>
</div>

<!-- ==================== 课表页 ==================== -->
<div class="page" id="page-schedules">
  <div class="card">
    <h2>📋 课表方案</h2>
    <div class="row">
      <select id="schedSelect" onchange="loadScheduleTasks()"></select>
      <button class="btn btn-green btn-sm" onclick="showAddSchedule()">➕ 新建课表</button>
      <button class="btn btn-blue btn-sm" onclick="activateSchedule()">✅ 激活</button>
      <button class="btn btn-red btn-sm" onclick="deleteSchedule()">🗑️ 删除</button>
    </div>
  </div>
  <div class="card">
    <h2>📝 课表任务</h2>
    <div class="row" style="margin-bottom:10px">
      <select id="taskZone" style="width:100px"><option value="A">区域A</option><option value="B">区域B</option><option value="C">区域C</option></select>
      <button class="btn btn-green btn-sm" onclick="showAddTask()">➕ 添加任务</button>
      <button class="btn btn-blue btn-sm" onclick="exportSchedule()">📥 导出Excel</button>
      <button class="btn btn-purple btn-sm" onclick="document.getElementById('importFile').click()">📤 导入Excel</button>
      <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importSchedule(this)">
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>区域</th><th>时间</th><th>铃声类型</th><th>任务名称</th><th>适用日期</th><th>一次性</th><th>操作</th></tr></thead>
        <tbody id="taskTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ==================== 区域页 ==================== -->
<div class="page" id="page-zones">
  <div class="zone-grid" id="zoneManageGrid"></div>
</div>

<!-- ==================== 铃声页 ==================== -->
<div class="page" id="page-bells">
  <div class="card">
    <h2>🎵 铃声库</h2>
    <div class="row" style="margin-bottom:10px">
      <button class="btn btn-green" onclick="document.getElementById('bellFile').click()">📤 上传铃声</button>
      <input type="file" id="bellFile" accept=".mp3,.wav,.ogg" style="display:none" onchange="uploadBell(this)">
    </div>
    <table>
      <thead><tr><th>名称</th><th>类型</th><th>文件</th><th>上传时间</th><th>操作</th></tr></thead>
      <tbody id="bellTable"></tbody>
    </table>
  </div>
  <div class="card">
    <h2>🔗 铃声绑定</h2>
    <p style="font-size:.85em;color:var(--dim);margin-bottom:10px">每个区域的每种铃声类型可以绑定不同的铃声文件</p>
    <div id="bellBindings"></div>
  </div>
</div>

<!-- ==================== 节假日页 ==================== -->
<div class="page" id="page-holidays">
  <div class="card">
    <h2>📅 即将到来</h2>
    <div class="upcoming-list" id="upcomingList"></div>
  </div>
  <div class="card">
    <h2>🗓️ 全年节假日</h2>
    <div class="row" style="margin-bottom:10px">
      <select id="holidayYear" onchange="loadHolidays()"></select>
      <button class="btn btn-green btn-sm" onclick="showAddHoliday()">➕ 自定义假期</button>
    </div>
    <div style="overflow-x:auto;max-height:400px;overflow-y:auto">
      <table>
        <thead><tr><th>日期</th><th>星期</th><th>名称</th><th>类型</th><th>操作</th></tr></thead>
        <tbody id="holidayTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ==================== 设置页 ==================== -->
<div class="page" id="page-settings">
  <div class="card">
    <h2>🌐 NTP网络校时</h2>
    <div class="form-group"><label>NTP服务器</label><input id="ntpServer" value="ntp.aliyun.com"></div>
    <div class="form-group"><label>每日校时时间</label><input id="ntpTime" value="06:00" placeholder="HH:MM"></div>
    <div class="form-group"><label>上次校时</label><span id="ntpLast" style="color:var(--dim)">从未</span></div>
    <div class="row">
      <button class="btn btn-blue" onclick="ntpSyncNow()">🔄 立即校时</button>
      <button class="btn btn-green" onclick="saveSettings('ntp')">💾 保存</button>
    </div>
  </div>
  <div class="card">
    <h2>🤖 钉钉机器人告警</h2>
    <div class="form-group"><label>Webhook地址</label><input id="dingtalkWebhook" placeholder="https://oapi.dingtalk.com/robot/send?access_token=..."></div>
    <div class="form-group">
      <label><input type="checkbox" id="dingtalkEnabled"> 启用钉钉告警（仅在异常时通知）</label>
    </div>
    <div class="row">
      <button class="btn btn-blue" onclick="dingtalkTest()">📡 发送测试消息</button>
      <button class="btn btn-green" onclick="saveSettings('dingtalk')">💾 保存</button>
    </div>
  </div>
  <div class="card">
    <h2>🔒 密码保护</h2>
    <p style="font-size:.85em;color:var(--dim);margin-bottom:8px">设置后访问系统需要输入密码，防止误操作</p>
    <div class="form-group"><label>设置密码</label><input id="setPassword" type="password" placeholder="留空则不设密码"></div>
    <button class="btn btn-green" onclick="saveSettings('password')">💾 保存</button>
  </div>
</div>

<!-- ==================== 日志页 ==================== -->
<div class="page" id="page-logs">
  <div class="card">
    <h2>📜 运行日志</h2>
    <div class="row" style="margin-bottom:10px">
      <select id="logCategory" onchange="loadLogs()" style="width:150px">
        <option value="">全部</option><option value="bell">打铃</option><option value="manual">手动</option>
        <option value="exception">例外</option><option value="system">系统</option><option value="settings">设置</option>
      </select>
      <button class="btn btn-gray btn-sm" onclick="loadLogs()">🔄 刷新</button>
    </div>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto">
      <table>
        <thead><tr><th>时间</th><th>级别</th><th>类别</th><th>信息</th></tr></thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
  </div>
</div>

</div><!-- .main -->

<!-- 通用弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast提示 -->
<div class="toast" id="toast"></div>

<script>
// ====== 全局变量 ======
let currentSchedule=null;
const BELL_TYPES={
  class_start:'上课铃',class_end:'下课铃',prepare:'预备铃',
  exercise:'课间操',lunch:'午餐铃',school_end:'放学铃',emergency:'紧急铃',custom:'自定义'
};
const ZONE_NAMES={A:'教学楼',B:'操场',C:'宿舍楼'};
const WEEKDAYS=['','周一','周二','周三','周四','周五','周六','周日'];

// ====== 工具函数 ======
async function api(url,method='GET',body=null){
  const opt={method,headers:{'Content-Type':'application/json','X-Auth-Token':getCookie('auth_token')}};
  if(body)opt.body=JSON.stringify(body);
  try{
    const r=await fetch(url,opt);
    if(r.status===401){window.location.reload();return null;}
    return await r.json();
  }catch(e){toast('请求失败: '+e.message,true);return null;}
}
function getCookie(name){const v=document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');return v?v.pop():'';}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' error':'')+' show';setTimeout(()=>t.className='toast',3000);}
function fmtDate(d){return d||'-';}
function fmtDays(d){if(!d)return '每天';return d.split(',').map(x=>WEEKDAYS[parseInt(x)]||x).join(' ');}

// ====== 导航 ======
document.querySelectorAll('.nav button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
    loadPage(btn.dataset.page);
  };
});

function loadPage(page){
  switch(page){
    case'dashboard':loadDashboard();break;
    case'schedules':loadSchedules();break;
    case'zones':loadZones();break;
    case'bells':loadBells();break;
    case'holidays':loadHolidays();break;
    case'settings':loadSettings();break;
    case'logs':loadLogs();break;
  }
}

// ====== 时钟 ======
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('zh-CN',{hour12:false});
  const d=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('dateInfo').textContent=d;
}
setInterval(updateClock,1000);updateClock();

// ====== 总览页 ======
async function loadDashboard(){
  const d=await api('/api/status');
  if(!d||!d.success)return;
  // 状态栏
  const sg=document.getElementById('statGrid');
  sg.innerHTML=`
    <div class="stat-box"><div class="label">当前课表</div><div class="value" style="color:var(--blue)">${d.active_schedule}</div></div>
    <div class="stat-box"><div class="label">今日状态</div><div class="value" style="color:${d.should_bell_today?'var(--green)':'var(--red)'}">${d.should_bell_today?'正常打铃':'休息日'}</div></div>
    <div class="stat-box"><div class="label">全局状态</div><div class="value" style="color:${d.global_paused?'var(--red)':'var(--green)'}">${d.global_paused?'已暂停':'运行中'}</div></div>
    <div class="stat-box"><div class="label">下次打铃</div><div class="value" style="color:var(--orange)">${d.next_bell?d.next_bell.time+' '+d.next_bell.name:'--'}</div></div>
  `;
  // 提醒条
  const ab=document.getElementById('dashAlert');
  const ob=document.getElementById('dashOk');
  if(d.global_paused){ab.style.display='block';ab.textContent='⚠️ 系统已全局暂停，打铃不会执行';ob.style.display='none';}
  else if(!d.should_bell_today){ob.style.display='block';ob.textContent='😴 今天是休息日，不打铃';ab.style.display='none';}
  else{ab.style.display='none';ob.style.display='none';}
  // 区域
  const zg=document.getElementById('zoneGrid');
  zg.innerHTML=d.zones.map(z=>{
    const cls='z'+z.id.toLowerCase();
    const sc=z.playing?'播放中':(z.paused?'已暂停':'空闲');
    const sc2=z.playing?'tag-green':(z.paused?'tag-red':'tag-blue');
    return `<div class="zone-card ${cls}">
      <div class="zname">${z.name}</div>
      <div class="zinfo"><span class="tag ${sc2}">${sc}</span></div>
      <div class="zinfo">音量: ${z.volume}% | 设备: ${z.device}</div>
      <div class="zactions">
        ${z.paused?`<button class="btn btn-green btn-sm" onclick="bellAction('resume','${z.id}')">恢复</button>`:`<button class="btn btn-red btn-sm" onclick="bellAction('pause','${z.id}')">暂停</button>`}
        ${z.playing?`<button class="btn btn-orange btn-sm" onclick="bellAction('stop','${z.id}')">停止</button>`:''}
      </div>
    </div>`;
  }).join('');
  // 今日例外
  const el=document.getElementById('exceptionList');
  if(d.today_exceptions&&d.today_exceptions.length){
    el.innerHTML=d.today_exceptions.map(e=>`<div style="font-size:.85em;color:var(--orange);margin:3px 0">
      🛑 ${e.action==='pause_all'?'全局暂停':e.zone_id+'区域暂停'} ${e.reason?'('+e.reason+')':''}
      <button class="btn btn-gray btn-sm" onclick="removeException(${e.id})" style="margin-left:6px">取消</button>
    </div>`).join('');
  }else{el.innerHTML='<span style="color:var(--dim);font-size:.85em">无今日例外</span>';}
}

async function bellAction(action,zone){
  await api('/api/bell/'+action,'POST',{zone_id:zone});
  toast(action==='pause'?'已暂停':action==='resume'?'已恢复':'已停止');
  loadDashboard();
}
function quickRing(type){api('/api/bell/ring','POST',{zone_id:'A',bell_type:type});toast('手动打铃: '+BELL_TYPES[type]);}

async function addException(action,zone){
  let reason='';
  if(action==='pause_all')reason='今天全部暂停';
  else if(zone)reason=ZONE_NAMES[zone]+'暂停';
  await api('/api/today_exceptions','POST',{action,zone_id:zone||'',reason});
  toast('已设置今日例外');
  loadDashboard();
}
async function removeException(eid){
  await api('/api/today_exceptions/'+eid,'DELETE');
  toast('已取消例外');loadDashboard();
}

// ====== 课表页 ======
async function loadSchedules(){
  const d=await api('/api/schedules');
  if(!d||!d.success)return;
  const sel=document.getElementById('schedSelect');
  sel.innerHTML=d.schedules.map(s=>`<option value="${s.id}" ${s.is_active?'selected':''}>${s.name} ${s.is_active?'[激活]':''} (${s.task_count}条)</option>`).join('');
  loadScheduleTasks();
}
async function loadScheduleTasks(){
  const sid=document.getElementById('schedSelect').value;
  if(!sid)return;
  const d=await api('/api/schedules');
  if(!d||!d.success)return;
  const sched=d.schedules.find(s=>s.id==sid);
  if(!sched)return;
  const tb=document.getElementById('taskTable');
  const allTasks=[];
  for(const[zid,tasks]of Object.entries(sched.zone_tasks)){
    tasks.forEach(t=>allTasks.push({...t,zone_id:zid}));
  }
  allTasks.sort((a,b)=>a.zone_id.localeCompare(b.zone_id)||a.time.localeCompare(b.time));
  tb.innerHTML=allTasks.map(t=>`<tr>
    <td><span class="zone-${t.zone_id.toLowerCase()}">${ZONE_NAMES[t.zone_id]||t.zone_id}</span></td>
    <td><b>${t.time}</b></td>
    <td><span class="tag tag-blue">${BELL_TYPES[t.bell_type]||t.bell_type}</span></td>
    <td>${t.task_name||'-'}</td>
    <td>${fmtDays(t.days)}</td>
    <td>${t.one_time_date||'-'}</td>
    <td><button class="btn btn-red btn-sm" onclick="deleteTask(${t.id})">删除</button></td>
  </tr>`).join('');
}
function showAddSchedule(){
  showModal(`<h2>新建课表</h2>
    <div class="form-group"><label>课表名称</label><input id="newSchedName" placeholder="如：考试课表"></div>
    <div class="row"><button class="btn btn-green" onclick="createSchedule()">创建</button>
    <button class="btn btn-gray" onclick="hideModal()">取消</button></div>`);
}
async function createSchedule(){
  const name=document.getElementById('newSchedName').value.trim();
  if(!name){toast('请输入名称',true);return;}
  await api('/api/schedules','POST',{name});
  hideModal();toast('课表已创建');loadSchedules();
}
async function activateSchedule(){
  const sid=document.getElementById('schedSelect').value;
  await api('/api/schedules/'+sid,'PUT',{activate:true});
  toast('课表已激活');loadSchedules();
}
async function deleteSchedule(){
  const sid=document.getElementById('schedSelect').value;
  if(!confirm('确定删除此课表？'))return;
  await api('/api/schedules/'+sid,'DELETE');
  toast('已删除');loadSchedules();
}
function showAddTask(){
  const sid=document.getElementById('schedSelect').value;
  const zid=document.getElementById('taskZone').value;
  showModal(`<h2>添加打铃任务</h2>
    <div class="form-group"><label>时间</label><input id="taskTime" type="time" value="08:00"></div>
    <div class="form-group"><label>铃声类型</label><select id="taskBellType">${Object.entries(BELL_TYPES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>
    <div class="form-group"><label>任务名称</label><input id="taskName" placeholder="如：第一节课上课"></div>
    <div class="form-group"><label>适用日期（1-5代表周一到周五，逗号分隔）</label><input id="taskDays" value="1,2,3,4,5"></div>
    <div class="form-group"><label>一次性日期（可选）</label><input id="taskOneTime" type="date"></div>
    <div class="row"><button class="btn btn-green" onclick="createTask(${sid},'${zid}')">添加</button>
    <button class="btn btn-gray" onclick="hideModal()">取消</button></div>`);
}
async function createTask(sid,zid){
  await api('/api/tasks','POST',{
    schedule_id:sid,zone_id:zid,
    time:document.getElementById('taskTime').value,
    bell_type:document.getElementById('taskBellType').value,
    task_name:document.getElementById('taskName').value,
    days:document.getElementById('taskDays').value,
    one_time_date:document.getElementById('taskOneTime').value,
  });
  hideModal();toast('任务已添加');loadScheduleTasks();
}
async function deleteTask(tid){
  if(!confirm('删除此任务？'))return;
  await api('/api/tasks/'+tid,'DELETE');loadScheduleTasks();
}
function exportSchedule(){window.open('/api/export','_blank');}
async function importSchedule(input){
  if(!input.files[0])return;
  const fd=new FormData();fd.append('file',input.files[0]);
  fd.append('schedule_name',input.files[0].name);
  const r=await fetch('/api/import',{method:'POST',body:fd});
  const d=await r.json();
  toast(d.success?`导入成功: ${d.imported}条`:'导入失败');
  loadSchedules();input.value='';
}

// ====== 区域页 ======
async function loadZones(){
  const d=await api('/api/zones');
  if(!d||!d.success)return;
  const g=document.getElementById('zoneManageGrid');
  g.innerHTML=d.zones.map(z=>{
    const cls='z'+z.id.toLowerCase();
    return `<div class="zone-card ${cls}">
      <div class="zname">${z.name}</div>
      <div class="form-group"><label>区域名称</label><input value="${z.name}" onchange="updateZone('${z.id}','name',this.value)"></div>
      <div class="form-group"><label>音量 <span id="vol${z.id}">${z.volume}</span>%</label>
        <input type="range" min="0" max="100" value="${z.volume}" oninput="document.getElementById('vol${z.id}').textContent=this.value" onchange="updateZone('${z.id}','volume',this.value)"></div>
      <div class="form-group"><label>音频输出设备</label><input value="${z.audio_device}" placeholder="默认设备" onchange="updateZone('${z.id}','audio_device',this.value)"></div>
      <div class="form-group"><label><input type="checkbox" ${z.enabled?'checked':''} onchange="updateZone('${z.id}','enabled',this.checked)"> 启用此区域</label></div>
      <div class="zactions" style="margin-top:10px">
        <button class="btn btn-red btn-sm" onclick="bellAction('pause','${z.id}')">⏸ 暂停</button>
        <button class="btn btn-green btn-sm" onclick="bellAction('resume','${z.id}')">▶ 恢复</button>
        <button class="btn btn-blue btn-sm" onclick="ringZone('${z.id}')">🔔 测试打铃</button>
      </div>
    </div>`;
  }).join('');
}
async function updateZone(zid,key,val){
  await api('/api/zones/'+zid,'PUT',{[key]:val});toast('已更新');
}
function ringZone(zid){api('/api/bell/ring','POST',{zone_id:zid,bell_type:'class_start'});toast('测试打铃');}

// ====== 铃声页 ======
async function loadBells(){
  const d=await api('/api/bells');
  if(!d||!d.success)return;
  const tb=document.getElementById('bellTable');
  tb.innerHTML=d.bells.map(b=>`<tr>
    <td>${b.name}</td><td><span class="tag tag-blue">${BELL_TYPES[b.bell_type]||b.bell_type}</span></td>
    <td style="font-size:.8em;color:var(--dim)">${b.filename}</td><td style="font-size:.8em">${b.uploaded_at||'-'}</td>
    <td><button class="btn btn-blue btn-sm" onclick="playBell('${b.filename}')">▶ 试听</button>
    <button class="btn btn-red btn-sm" onclick="deleteBell(${b.id})">删除</button></td>
  </tr>`).join('')||'<tr><td colspan="5" class="empty">暂无铃声，请上传</td></tr>';
  // 铃声绑定
  const bd=document.getElementById('bellBindings');
  const types=['class_start','class_end','prepare','exercise','lunch','school_end','emergency'];
  const zones=['A','B','C'];
  let html='<table><thead><tr><th>铃声类型</th><th>区域A</th><th>区域B</th><th>区域C</th></tr></thead><tbody>';
  types.forEach(t=>{
    html+=`<tr><td><b>${BELL_TYPES[t]}</b></td>`;
    zones.forEach(z=>{
      const key=`${z}_${t}`;
      const cur=d.bindings[key]||'';
      const opts=d.bells.map(b=>`<option value="${b.id}" ${b.id==cur?'selected':''}>${b.name}</option>`).join('');
      html+=`<td><select onchange="updateBinding('${z}','${t}',this.value)" style="width:100%;font-size:.8em"><option value="">--默认--</option>${opts}</select></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  bd.innerHTML=html;
}
function playBell(filename){const a=new Audio('/static/sounds/'+filename);a.play();toast('试听中...');}
async function uploadBell(input){
  if(!input.files[0])return;
  const fd=new FormData();fd.append('file',input.files[0]);
  fd.append('name',input.files[0].name.replace(/\.[^.]+$/,''));
  fd.append('bell_type','custom');
  const r=await fetch('/api/bells/upload',{method:'POST',body:fd});
  const d=await r.json();toast(d.message||'上传成功');loadBells();input.value='';
}
async function deleteBell(bid){if(!confirm('删除此铃声？'))return;await api('/api/bells/'+bid,'DELETE');loadBells();}
async function updateBinding(zid,btype,bid){
  await api('/api/bell_bindings','POST',{zone_id:zid,bell_type:btype,bell_id:parseInt(bid)||null});
  toast('绑定已更新');
}

// ====== 节假日页 ======
async function loadHolidays(){
  const year=new Date().getFullYear();
  const sel=document.getElementById('holidayYear');
  if(!sel.innerHTML){
    sel.innerHTML=[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}年</option>`).join('');
  }
  const y=parseInt(sel.value);
  const d=await api('/api/holidays?year='+y);
  if(!d||!d.success)return;
  // 即将到来
  const ul=document.getElementById('upcomingList');
  ul.innerHTML=d.upcoming.map(h=>`<div class="upcoming-item">
    <span>${h.date} ${h.weekday} <span class="tag ${h.type==='holiday'?'tag-red':'tag-green'}">${h.name}</span></span>
    <span class="days">${h.days_away}天后</span>
  </div>`).join('')||'<div class="empty">近期无节假日</div>';
  // 全年列表
  const tb=document.getElementById('holidayTable');
  tb.innerHTML=d.holidays.map(h=>{
    const dt=new Date(h.date);
    const wd=WEEKDAYS[dt.getDay()||7];
    const tc=h.type==='holiday'?'tag-red':'tag-green';
    const tl=h.type==='holiday'?'放假':'补班';
    const delBtn=h.custom?`<button class="btn btn-red btn-sm" onclick="deleteCustomHoliday(${h.id})">删除</button>`:'';
    return `<tr><td>${h.date}</td><td>${wd}</td><td>${h.name}</td>
    <td><span class="tag ${tc}">${tl}</span></td><td>${delBtn}</td></tr>`;
  }).join('');
}
function showAddHoliday(){
  showModal(`<h2>添加自定义假期</h2>
    <div class="form-group"><label>日期</label><input id="customDate" type="date"></div>
    <div class="form-group"><label>名称</label><input id="customName" placeholder="如：校庆"></div>
    <div class="form-group"><label><input type="checkbox" id="customIsHoliday" checked> 是放假（否则为补班）</label></div>
    <div class="row"><button class="btn btn-green" onclick="addCustomHoliday()">添加</button>
    <button class="btn btn-gray" onclick="hideModal()">取消</button></div>`);
}
async function addCustomHoliday(){
  await api('/api/holidays/custom','POST',{
    date:document.getElementById('customDate').value,
    name:document.getElementById('customName').value,
    is_holiday:document.getElementById('customIsHoliday').checked
  });
  hideModal();toast('已添加');loadHolidays();
}
async function deleteCustomHoliday(hid){
  await api('/api/holidays/custom/'+hid,'DELETE');loadHolidays();
}

// ====== 设置页 ======
async function loadSettings(){
  const d=await api('/api/settings');
  if(!d||!d.success)return;
  document.getElementById('ntpServer').value=d.settings.ntp_server||'ntp.aliyun.com';
  document.getElementById('ntpTime').value=d.settings.ntp_daily_time||'06:00';
  document.getElementById('ntpLast').textContent=d.settings.ntp_last_sync||'从未';
  document.getElementById('dingtalkWebhook').value=d.settings.dingtalk_webhook||'';
  document.getElementById('dingtalkEnabled').checked=d.settings.dingtalk_enabled==='1';
}
async function saveSettings(section){
  const data={};
  if(section==='ntp'){
    data.ntp_server=document.getElementById('ntpServer').value;
    data.ntp_daily_time=document.getElementById('ntpTime').value;
  }else if(section==='dingtalk'){
    data.dingtalk_webhook=document.getElementById('dingtalkWebhook').value;
    data.dingtalk_enabled=document.getElementById('dingtalkEnabled').checked?'1':'0';
  }else if(section==='password'){
    const pwd=document.getElementById('setPassword').value;
    if(pwd)data.password=pwd;
  }
  await api('/api/settings','POST',data);toast('设置已保存');
}
async function ntpSyncNow(){
  const d=await api('/api/ntp/sync','POST');
  if(d&&d.success){toast('校时成功，偏差: '+d.offset.toFixed(3)+'秒');loadSettings();}
  else toast('校时失败',true);
}
async function dingtalkTest(){
  const d=await api('/api/dingtalk/test','POST');
  toast(d&&d.success?'测试消息已发送':'发送失败',!d||!d.success);
}

// ====== 日志页 ======
async function loadLogs(){
  const cat=document.getElementById('logCategory').value;
  const d=await api('/api/logs?category='+cat+'&per_page=100');
  if(!d||!d.success)return;
  const tb=document.getElementById('logTable');
  tb.innerHTML=d.logs.map(l=>{
    const lc=l.level==='ERROR'?'tag-red':'tag-blue';
    return `<tr><td style="font-size:.8em;white-space:nowrap">${l.timestamp}</td>
    <td><span class="tag ${lc}">${l.level}</span></td>
    <td><span class="tag tag-blue">${l.category}</span></td>
    <td>${l.message}</td></tr>`;
  }).join('')||'<tr><td colspan="4" class="empty">暂无日志</td></tr>';
}

// ====== 弹窗 ======
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modal').classList.add('show');}
function hideModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))hideModal();};

// ====== 初始化 ======
loadDashboard();
setInterval(loadDashboard,5000);
</script>
